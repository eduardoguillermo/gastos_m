<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanzasPro - Multi-Wallet Edition</title>
    <style>
        :root {
            --bg-main: #f1f5f9;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary: #2563eb;
            --ingreso: #10b981;
            --ingreso-bg: #e6f4ea;
            --gasto: #ef4444;
            --gasto-bg: #fce8e6;
            --border: #cbd5e1;
            --radius: 6px;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        html, body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-main); 
            color: var(--text-main); 
            padding: 8px;
            font-size: 13px;
            display: flex;
            flex-direction: column;
        }
        
        .container { 
            width: 100%; 
            height: 100%;
            max-width: 100%; 
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            background: var(--bg-card); padding: 6px 12px;
            border-radius: var(--radius); border: 1px solid var(--border);
            flex-shrink: 0; flex-wrap: wrap; gap: 8px;
        }
        header h1 { font-size: 13px; font-weight: 700; }
        header h1 span { color: var(--primary); }
        
        .balance-strip { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .balance-item { display: flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 500; color: var(--text-muted); }
        .balance-item b { font-size: 13px; font-weight: 700; color: var(--text-main); }
        
        .workspace-grid { 
            display: grid; 
            grid-template-columns: 260px 260px 1fr 280px; 
            gap: 8px; 
            flex-grow: 1;
            min-height: 0;
        }
        @media (max-width: 1200px) { 
            .workspace-grid { grid-template-columns: 1fr; overflow-y: auto; } 
            .panel { height: auto !important; max-height: none !important; }
        }
        
        .panel { 
            background: var(--bg-card); padding: 12px; border-radius: var(--radius); 
            border: 1px solid var(--border); display: flex; flex-direction: column;
            height: 100%; min-height: 0;
        }
        .panel h3 { font-size: 12px; font-weight: 700; margin-bottom: 10px; padding-bottom: 4px; border-bottom: 1px solid var(--border); color: #334155; flex-shrink: 0; }
        
        .form-container { flex-shrink: 0; }
        .form-group { margin-bottom: 6px; }
        label { display: block; margin-bottom: 2px; font-weight: 600; font-size: 11px; color: #475569; }
        input, select { 
            width: 100%; padding: 5px 8px; border: 1px solid var(--border); 
            border-radius: 4px; font-size: 12px; color: var(--text-main); background-color: #fff;
        }
        input:focus, select:focus { outline: none; border-color: var(--primary); }
        
        button { 
            display: inline-flex; align-items: center; justify-content: center; gap: 4px;
            padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; 
            font-weight: 600; font-size: 12px;
        }
        button.btn-block { width: 100%; padding: 8px; }
        button.btn-primary { background: var(--primary); color: white; }
        button.btn-secondary { background: #e2e8f0; color: #334155; }
        button.btn-secondary:hover { background: #cbd5e1; }
        
        .scroll-list { 
            overflow-y: auto; 
            flex-grow: 1;
            padding-right: 2px;
            min-height: 0;
        }
        .scroll-list::-webkit-scrollbar { width: 4px; }
        .scroll-list::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }
        
        .compact-row { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 5px 8px; background: #f8fafc; border: 1px solid #e2e8f0;
            border-radius: 4px; margin-bottom: 4px; font-size: 12px;
        }
        .compact-row:hover { background: #f1f5f9; }
        
        .month-card {
            background: #f8fafc; border: 1px solid var(--border);
            border-radius: 6px; padding: 8px; margin-bottom: 6px;
        }
        .month-header { font-weight: 700; color: #1e293b; border-bottom: 1px dashed var(--border); padding-bottom: 3px; margin-bottom: 5px; text-transform: capitalize; }
        .month-data { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 2px; }
        
        .badge { display: inline-block; padding: 1px 4px; border-radius: 3px; font-size: 9px; font-weight: 700; text-transform: uppercase; }
        .badge.gasto { background: var(--gasto-bg); color: var(--gasto); }
        .badge.ingreso { background: var(--ingreso-bg); color: var(--ingreso); }
        .badge.wallet { background: #f1f5f9; color: #475569; border: 1px solid var(--border); margin-left: 2px; }
        
        .actions-wrapper { display: flex; gap: 2px; }
        .btn-trigger { background: transparent; color: var(--text-muted); padding: 4px; border: none; cursor: pointer; border-radius: 3px; font-size: 11px; }
        .btn-trigger:hover { background: #e2e8f0; color: var(--text-main); }
        .btn-trigger.danger:hover { background: var(--gasto-bg); color: var(--gasto); }
        
        .filter-strip { display: flex; background: #e2e8f0; padding: 2px; border-radius: 4px; gap: 2px; }
        .filter-tab { background: transparent; color: var(--text-muted); padding: 4px 6px; border-radius: 3px; font-size: 11px; font-weight: 600; border: none; cursor: pointer; }
        .filter-tab.active { background: white; color: var(--text-main); }
        
        footer { 
            background: var(--bg-card); border: 1px solid var(--border); padding: 6px 14px; 
            border-radius: var(--radius); display: flex; justify-content: space-between; align-items: center; font-size: 11px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Finanzas<span>Pro</span> <small style="color:var(--text-muted); font-size:10px;">v5.0 Multi-Wallet</small></h1>
        
        <!-- Línea de micro-balances individuales y globales -->
        <div class="balance-strip">
            <div class="balance-item">Neto: <b id="view-balance">$0,00</b></div>
            <div style="width:1px; height:12px; background:var(--border);"></div>
            <div class="balance-item">💵 Efec: <b id="view-bal-efectivo">$0,00</b></div>
            <div style="width:1px; height:12px; background:var(--border);"></div>
            <div class="balance-item">💳 Déb1: <b id="view-bal-debito1">$0,00</b></div>
            <div style="width:1px; height:12px; background:var(--border);"></div>
            <div class="balance-item">💳 Déb2: <b id="view-bal-debito2">$0,00</b></div>
            <div style="width:1px; height:12px; background:var(--border);"></div>
            <div class="balance-item" style="color:var(--ingreso);">I: <b id="view-ingresos" style="color:var(--ingreso); font-size:11px;">$0,00</b></div>
            <div class="balance-item" style="color:var(--gasto);">G: <b id="view-gastos" style="color:var(--gasto); font-size:11px;">$0,00</b></div>
        </div>
    </header>
    
    <div class="workspace-grid">
        <!-- Columna 1: Rubros -->
        <div class="panel">
            <h3>📁 Rubros</h3>
            <div class="form-container">
                <div class="form-group">
                    <label for="rubro-nombre">Nombre Rubro</label>
                    <input type="text" id="rubro-nombre" autocomplete="off" placeholder="Ej: Nafta...">
                </div>
                <div class="form-group">
                    <label for="rubro-tipo">Tipo</label>
                    <select id="rubro-tipo">
                        <option value="gasto">Gasto</option>
                        <option value="ingreso">Ingreso</option>
                    </select>
                </div>
                <input type="hidden" id="rubro-edit-id" value="">
                
                <div style="display: flex; gap: 4px; margin-bottom: 10px;">
                    <button id="btn-guardar-rubro" class="btn-primary" style="flex:1;">Añadir</button>
                    <button id="btn-cancelar-rubro" class="btn-secondary" style="display:none;">X</button>
                </div>
            </div>
            <div class="scroll-list" id="lista-rubros"></div>
        </div>

        <!-- Columna 2: Carga con Selector de Fondos -->
        <div class="panel">
            <h3>✍️ Carga de Transacciones</h3>
            <div class="form-container">
                <div class="form-group">
                    <label for="mov-concepto">Concepto / Detalle</label>
                    <input type="text" id="mov-concepto" autocomplete="off" placeholder="Ej: Pago repuesto...">
                </div>
                <div class="form-group">
                    <label for="mov-monto">Monto ($)</label>
                    <input type="number" id="mov-monto" step="0.01" min="0.01" placeholder="0,00">
                </div>
                <div class="form-group">
                    <label for="mov-rubro">Asignar Rubro</label>
                    <select id="mov-rubro"></select>
                </div>
                <div class="form-group">
                    <label for="mov-origen">Método / Origen de Fondos</label>
                    <select id="mov-origen">
                        <option value="efectivo">💵 Efectivo</option>
                        <option value="debito1">💳 Débito Banco 1</option>
                        <option value="debito2">💳 Débito Banco 2</option>
                    </select>
                </div>
                <button id="btn-guardar-movimiento" class="btn-primary btn-block" style="background:#0f172a; margin-top:6px;">Asentar Registro</button>
            </div>
        </div>

        <!-- Columna 3: Libro Diario -->
        <div class="panel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid var(--border); flex-shrink: 0;">
                <h3 style="margin-bottom:0; border-bottom:none;">📊 Libro de Movimientos</h3>
                <div class="filter-strip">
                    <button class="filter-tab active" id="filter-all">Todos</button>
                    <button class="filter-tab" id="filter-gasto">Gastos</button>
                    <button class="filter-tab" id="filter-ingreso">Ingresos</button>
                </div>
            </div>
            <div class="scroll-list" id="lista-movimientos"></div>
        </div>

        <!-- Columna 4: Reporte Mensual -->
        <div class="panel">
            <h3>📈 Reporte por Mes</h3>
            <div class="scroll-list" id="lista-reporte-mensual"></div>
        </div>
    </div>

    <footer>
        <span style="color: var(--text-muted);" id="db-status">Almacenamiento Local Activo</span>
        <div class="actions-wrapper">
            <button class="btn-secondary" onclick="exportarBackup()" style="padding: 4px 8px; font-size:11px;">📥 Exportar</button>
            <button class="btn-secondary" onclick="document.getElementById('file-import').click()" style="padding: 4px 8px; font-size:11px;">📤 Importar</button>
            <input type="file" id="file-import" accept=".json" onchange="importarBackup(event)">
        </div>
    </footer>
</div>

<script>
    let storageDisponible = true;
    try {
        localStorage.setItem('__brve__', '1');
        localStorage.removeItem('__brve__');
    } catch (e) {
        storageDisponible = false;
        document.getElementById('db-status').textContent = "Modo Volátil (Brave Shields)";
    }

    let DB = {
        nid: 1,
        rubros: [
            { id: 1, nombre: 'Sueldo', tipo: 'ingreso' },
            { id: 2, nombre: 'Supermercado', tipo: 'gasto' },
            { id: 3, nombre: 'Servicios', tipo: 'gasto' }
        ],
        movimientos: []
    };

    const SKEY = 'finanzas-pro-compact-v5';
    let filtroActual = 'all';

    window.onload = function() {
        if (storageDisponible && localStorage.getItem(SKEY)) {
            try { DB = JSON.parse(localStorage.getItem(SKEY)); } catch(e) {}
        } else {
            DB.nid = 4;
            save();
        }
        
        document.getElementById('btn-guardar-rubro').addEventListener('click', guardarRubro);
        document.getElementById('btn-cancelar-rubro').addEventListener('click', cancelarEdicionRubro);
        document.getElementById('btn-guardar-movimiento').addEventListener('click', guardarMovimiento);
        
        document.getElementById('filter-all').addEventListener('click', () => setFiltro('all'));
        document.getElementById('filter-gasto').addEventListener('click', () => setFiltro('gasto'));
        document.getElementById('filter-ingreso').addEventListener('click', () => setFiltro('ingreso'));

        render();
    };

    function save() {
        if (storageDisponible) localStorage.setItem(SKEY, JSON.stringify(DB));
    }

    function guardarRubro() {
        const nombreInput = document.getElementById('rubro-nombre');
        const tipoSelect = document.getElementById('rubro-tipo');
        const editIdInput = document.getElementById('rubro-edit-id');
        const nombre = nombreInput.value.trim();
        if (!nombre) return;

        if (editIdInput.value) {
            const rubro = DB.rubros.find(r => r.id == editIdInput.value);
            if (rubro) { rubro.nombre = nombre; rubro.tipo = tipoSelect.value; }
            document.getElementById('btn-guardar-rubro').textContent = 'Añadir';
            document.getElementById('btn-cancelar-rubro').style.display = 'none';
            editIdInput.value = '';
        } else {
            DB.rubros.push({ id: DB.nid++, nombre: nombre, tipo: tipoSelect.value });
        }
        nombreInput.value = '';
        save(); render();
    }

    function editarRubro(id) {
        const rubro = DB.rubros.find(r => r.id == id);
        if (!rubro) return;
        document.getElementById('rubro-nombre').value = rubro.nombre;
        document.getElementById('rubro-tipo').value = rubro.tipo;
        document.getElementById('rubro-edit-id').value = rubro.id;
        document.getElementById('btn-guardar-rubro').textContent = 'Actualizar';
        document.getElementById('btn-cancelar-rubro').style.display = 'inline-flex';
    }

    function eliminarRubro(id) {
        if (!confirm('¿Eliminar rubro?')) return;
        DB.rubros = DB.rubros.filter(r => r.id != id);
        save(); render();
    }

    function guardarMovimiento() {
        const conceptoInput = document.getElementById('mov-concepto');
        const montoInput = document.getElementById('mov-monto');
        const rubroSelect = document.getElementById('mov-rubro');
        const origenSelect = document.getElementById('mov-origen');
        
        const monto = parseFloat(montoInput.value);
        const rubroId = parseInt(rubroSelect.value);
        const origen = origenSelect.value;

        if (isNaN(monto) || monto <= 0 || isNaN(rubroId)) return alert('Verifique los datos de carga.');

        DB.movimientos.push({
            id: DB.nid++,
            concepto: conceptoInput.value.trim() || 'General',
            monto: monto,
            rubroId: rubroId,
            origen: origen, // Guardado de la billetera origen
            fecha: new Date().toLocaleDateString()
        });

        conceptoInput.value = ''; montoInput.value = '';
        save(); render();
    }

    function eliminarMovimiento(id) {
        if (!confirm('¿Remover asiento?')) return;
        DB.movimientos = DB.movimientos.filter(m => m.id != id);
        save(); render();
    }

    function exportarBackup() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(DB, null, 2));
        const downloadAnchor = document.createElement('a');
        const ahora = new Date();
        const fechaStr = ahora.toISOString().slice(0,10);
        const horaStr = ahora.toTimeString().slice(0,8).replace(/:/g, '-');
        
        downloadAnchor.setAttribute("href", dataStr);
        downloadAnchor.setAttribute("download", `backup_contable_${fechaStr}_${horaStr}.json`);
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click(); downloadAnchor.remove();
    }

    function importarBackup(event) {
        const reader = new FileReader();
        reader.onload = function() {
            try {
                const parsed = JSON.parse(reader.result);
                if (parsed.rubros && parsed.movimientos) {
                    if (confirm('Se detectó una copia válida. ¿Desea restaurarla?')) {
                        DB = parsed;
                        
                        // Blindaje de compatibilidad: si el registro no tiene origen, va a Efectivo
                        DB.movimientos.forEach(m => {
                            if (!m.origen) m.origen = 'efectivo';
                        });

                        if (!DB.nid) {
                            const maxRubro = DB.rubros.reduce((max, r) => r.id > max ? r.id : max, 0);
                            const maxMov = DB.movimientos.reduce((max, m) => m.id > max ? m.id : max, 0);
                            DB.nid = Math.max(maxRubro, maxMov) + 1;
                        }
                        save(); render();
                        alert('Base de datos restaurada correctamente.');
                    }
                } else {
                    alert('Estructura contable no compatible.');
                }
            } catch(e) { alert('Fallo al interpretar el JSON.'); }
        };
        if(event.target.files[0]) reader.readAsText(event.target.files[0]);
        event.target.value = '';
    }

    function setFiltro(tipo) {
        filtroActual = tipo;
        document.querySelectorAll('.filter-tab').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`filter-${tipo}`).classList.add('active');
        render();
    }

    function formatMoneda(valor) {
        return '$' + valor.toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, ".");
    }

    function obtenerMesClave(fechaStr) {
        if (!fechaStr || typeof fechaStr !== 'string') return { orden: '0000-00', etiqueta: 'General' };
        let d = NaN, m = NaN, a = NaN;
        let partes = fechaStr.includes('/') ? fechaStr.split('/') : fechaStr.split('-');
        
        if (partes.length >= 3) {
            if (partes[0].length === 4) {
                a = parseInt(partes[0]); m = parseInt(partes[1]) - 1; d = parseInt(partes[2]);
            } else {
                d = parseInt(partes[0]); m = parseInt(partes[1]) - 1; a = parseInt(partes[2]);
            }
        }
        if (isNaN(d) || isNaN(m) || isNaN(a)) {
            const dateObj = new Date(fechaStr);
            if (!isNaN(dateObj.getTime())) {
                d = dateObj.getDate(); m = dateObj.getMonth(); a = dateObj.getFullYear();
            } else {
                return { orden: '9999-12', etiqueta: 'Fecha General' };
            }
        }
        const nombresMeses = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
        return { orden: `${a}-${String(m + 1).padStart(2, '0')}`, etiqueta: `${nombresMeses[m]} ${a}` };
    }

    function render() {
        DB.rubros.sort((a, b) => a.nombre.localeCompare(b.nombre));

        // 1. Render Rubros
        const listaRubros = document.getElementById('lista-rubros');
        listaRubros.innerHTML = '';
        DB.rubros.forEach(r => {
            const div = document.createElement('div');
            div.className = 'compact-row';
            div.innerHTML = `
                <span><strong>${r.nombre}</strong> <span class="badge ${r.tipo}">${r.tipo[0]}</span></span>
                <div class="actions-wrapper">
                    <button class="btn-trigger edit-b">✏️</button>
                    <button class="btn-trigger danger del-b">🗑️</button>
                </div>
            `;
            div.querySelector('.edit-b').addEventListener('click', () => editarRubro(r.id));
            div.querySelector('.del-b').addEventListener('click', () => eliminarRubro(r.id));
            listaRubros.appendChild(div);
        });

        // 2. Render Selector
        const rubroSelect = document.getElementById('mov-rubro');
        rubroSelect.innerHTML = '';
        DB.rubros.forEach(r => {
            const opt = document.createElement('option');
            opt.value = r.id;
            opt.textContent = `${r.nombre} (${r.tipo[0].toUpperCase()})`;
            rubroSelect.appendChild(opt);
        });

        // 3. Render Historial, Cálculos Globales y de Cuentas
        const listaMovimientos = document.getElementById('lista-movimientos');
        listaMovimientos.innerHTML = '';
        
        let tIngresos = 0, tGastos = 0;
        let balEfectivo = 0, balDebito1 = 0, balDebito2 = 0;
        let mapaMensual = {};

        DB.movimientos.forEach(m => {
            const rubro = DB.rubros.find(r => r.id === m.rubroId);
            const tipo = rubro ? rubro.tipo : 'gasto';
            const mOrigen = m.origen || 'efectivo';
            
            // Computación global
            if (tipo === 'ingreso') tIngresos += m.monto; else tGastos += m.monto;
            
            // Computación por cuenta/origen individual
            if (mOrigen === 'efectivo') {
                if (tipo === 'ingreso') balEfectivo += m.monto; else balEfectivo -= m.monto;
            } else if (mOrigen === 'debito1') {
                if (tipo === 'ingreso') balDebito1 += m.monto; else balDebito1 -= m.monto;
            } else if (mOrigen === 'debito2') {
                if (tipo === 'ingreso') balDebito2 += m.monto; else balDebito2 -= m.monto;
            }
            
            // Agrupación mensual para reportes
            const infoMes = obtenerMesClave(m.fecha);
            if (!mapaMensual[infoMes.orden]) {
                mapaMensual[infoMes.orden] = { etiqueta: infoMes.etiqueta, ingresos: 0, gastos: 0 };
            }
            if (tipo === 'ingreso') mapaMensual[infoMes.orden].ingresos += m.monto;
            else mapaMensual[infoMes.orden].gastos += m.monto;
        });

        const filtrados = DB.movimientos.filter(m => {
            if (filtroActual === 'all') return true;
            const rubro = DB.rubros.find(r => r.id === m.rubroId);
            return (rubro ? rubro.tipo : 'gasto') === filtroActual;
        });

        const diccionarioOrigen = { 'efectivo': 'EFEC', 'debito1': 'DEB1', 'debito2': 'DEB2' };

        if (filtrados.length === 0) {
            listaMovimientos.innerHTML = `<div style="text-align:center; padding:15px; color:var(--text-muted);">Sin asientos.</div>`;
        } else {
            [...filtrados].reverse().forEach(m => {
                const rubro = DB.rubros.find(r => r.id === m.rubroId);
                const tipo = rubro ? rubro.tipo : 'gasto';
                const nRubro = rubro ? rubro.nombre : 'S/R';
                const tagOrigen = diccionarioOrigen[m.origen || 'efectivo'];

                const div = document.createElement('div');
                div.className = 'compact-row';
                div.innerHTML = `
                    <div>
                        <strong style="color:#0f172a;">${m.concepto}</strong> 
                        <span style="color:var(--text-muted); font-size:10px; margin-left:4px;">${m.fecha}</span>
                        <span class="badge ${tipo}" style="margin-left:4px;">${nRubro}</span>
                        <span class="badge wallet">${tagOrigen}</span>
                    </div>
                    <div class="actions-wrapper" style="align-items:center;">
                        <span style="font-weight:700; margin-right:6px; color:var(--${tipo})">
                            ${tipo === 'gasto' ? '-' : '+'}${formatMoneda(m.monto)}
                        </span>
                        <button class="btn-trigger danger del-m">🗑️</button>
                    </div>
                `;
                div.querySelector('.del-m').addEventListener('click', () => eliminarMovimiento(m.id));
                listaMovimientos.appendChild(div);
            });
        }

        // 4. Render Reporte Mensual
        const listaReporte = document.getElementById('lista-reporte-mensual');
        listaReporte.innerHTML = '';
        const mesesOrdenados = Object.keys(mapaMensual).sort().reverse();
        
        if (mesesOrdenados.length === 0) {
            listaReporte.innerHTML = `<div style="text-align:center; padding:15px; color:var(--text-muted);">Sin datos mensuales.</div>`;
        } else {
            mesesOrdenados.forEach(clave => {
                const datos = mapaMensual[clave];
                const balMensual = datos.ingresos - datos.gastos;
                const colorBal = balMensual >= 0 ? 'var(--ingreso)' : 'var(--gasto)';
                
                const div = document.createElement('div');
                div.className = 'month-card';
                div.innerHTML = `
                    <div class="month-header">${datos.etiqueta}</div>
                    <div class="month-data"><span>Ingresos:</span> <span style="color:var(--ingreso); font-weight:600;">+${formatMoneda(datos.ingresos)}</span></div>
                    <div class="month-data"><span>Gastos:</span> <span style="color:var(--gasto); font-weight:600;">-${formatMoneda(datos.gastos)}</span></div>
                    <div class="month-data" style="margin-top:4px; padding-top:4px; border-top:1px solid #e2e8f0; font-weight:700;">
                        <span>Neto:</span> <span style="color:${colorBal};">${formatMoneda(balMensual)}</span>
                    </div>
                `;
                listaReporte.appendChild(div);
            });
        }

        // Actualización de micro-balances en barra superior
        document.getElementById('view-ingresos').textContent = formatMoneda(tIngresos);
        document.getElementById('view-gastos').textContent = formatMoneda(tGastos);
        
        const balanceTotal = tIngresos - tGastos;
        const bEl = document.getElementById('view-balance');
        bEl.textContent = formatMoneda(balanceTotal);
        bEl.style.color = balanceTotal >= 0 ? 'var(--ingreso)' : 'var(--gasto)';

        // Pintar balances individuales de billeteras
        const elEf = document.getElementById('view-bal-efectivo');
        elEf.textContent = formatMoneda(balEfectivo); elEf.style.color = balEfectivo >= 0 ? '' : 'var(--gasto)';
        
        const elD1 = document.getElementById('view-bal-debito1');
        elD1.textContent = formatMoneda(balDebito1); elD1.style.color = balDebito1 >= 0 ? '' : 'var(--gasto)';
        
        const elD2 = document.getElementById('view-bal-debito2');
        elD2.textContent = formatMoneda(balDebito2); elD2.style.color = balDebito2 >= 0 ? '' : 'var(--gasto)';
    }

    function cancelarEdicionRubro() {
        document.getElementById('rubro-nombre').value = '';
        document.getElementById('rubro-edit-id').value = '';
        document.getElementById('btn-guardar-rubro').textContent = 'Añadir';
        document.getElementById('btn-cancelar-rubro').style.display = 'none';
    }
</script>
</body>
</html>
