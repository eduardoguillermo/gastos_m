<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanzasPro - Advanced Ledger</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://images.unsplash.com/photo-1579621970563-ebec7560ff3e?w=192&h=192&fit=crop&auto=format">

    <style>
        :root {
            --bg-main: #f1f5f9;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary: #2563eb;
            --ingreso: #10b981;
            --ingreso-bg: #e6f4ea;
            --gasto: #ef4444;
            --gasto-bg: #fce8e6;
            --border: #cbd5e1;
            --radius: 6px;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        html, body { height: 100vh; width: 100vw; overflow: hidden; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-main); color: var(--text-main); padding: 8px; font-size: 13px;
            display: flex; flex-direction: column;
        }
        
        .container { width: 100%; height: 100%; max-width: 100%; margin: 0; display: flex; flex-direction: column; gap: 8px; }
        
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            background: var(--bg-card); padding: 6px 12px; border-radius: var(--radius); border: 1px solid var(--border);
            flex-shrink: 0; flex-wrap: wrap; gap: 8px;
        }
        header h1 { font-size: 13px; font-weight: 700; }
        header h1 span { color: var(--primary); }
        
        .balance-strip { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .balance-item { display: flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 500; color: var(--text-muted); }
        .balance-item b { font-size: 13px; font-weight: 700; color: var(--text-main); }
        
        .workspace-grid { 
            display: grid; grid-template-columns: 260px 260px 1fr 280px; gap: 8px; flex-grow: 1; min-height: 0;
        }
        @media (max-width: 1200px) { 
            .workspace-grid { grid-template-columns: 1fr; overflow-y: auto; } 
            .panel { height: auto !important; max-height: none !important; }
        }
        
        .panel { 
            background: var(--bg-card); padding: 12px; border-radius: var(--radius); 
            border: 1px solid var(--border); display: flex; flex-direction: column; height: 100%; min-height: 0;
        }
        .panel h3 { font-size: 12px; font-weight: 700; margin-bottom: 10px; padding-bottom: 4px; border-bottom: 1px solid var(--border); color: #334155; flex-shrink: 0; }
        
        .form-container { flex-shrink: 0; }
        .form-group { margin-bottom: 6px; }
        label { display: block; margin-bottom: 2px; font-weight: 600; font-size: 11px; color: #475569; }
        input, select { 
            width: 100%; padding: 5px 8px; border: 1px solid var(--border); border-radius: 4px; font-size: 12px; color: var(--text-main); background-color: #fff;
        }
        input:focus, select:focus { outline: none; border-color: var(--primary); }
        
        button { 
            display: inline-flex; align-items: center; justify-content: center; gap: 4px; padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 12px;
        }
        button.btn-block { width: 100%; padding: 8px; }
        button.btn-primary { background: var(--primary); color: white; }
        button.btn-secondary { background: #e2e8f0; color: #334155; }
        button.btn-secondary:hover { background: #cbd5e1; }
        
        .date-filter-strip {
            display: flex; gap: 4px; background: #f8fafc; padding: 6px; border-radius: 4px; border: 1px solid var(--border); margin-bottom: 8px; flex-shrink: 0;
        }
        .date-filter-group { flex: 1; }
        .date-filter-group input { padding: 3px 6px; font-size: 11px; }

        .scroll-list { overflow-y: auto; flex-grow: 1; padding-right: 2px; min-height: 0; }
        .scroll-list::-webkit-scrollbar { width: 4px; }
        .scroll-list::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }
        
        .compact-row { 
            display: flex; justify-content: space-between; align-items: center; padding: 5px 8px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 4px; margin-bottom: 4px; font-size: 12px;
        }
        .compact-row:hover { background: #f1f5f9; }
        
        .month-card { background: #f8fafc; border: 1px solid var(--border); border-radius: 6px; padding: 8px; margin-bottom: 6px; }
        .month-header { font-weight: 700; color: #1e293b; border-bottom: 1px dashed var(--border); padding-bottom: 3px; margin-bottom: 5px; text-transform: capitalize; }
        .month-data { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 2px; }
        
        .badge { display: inline-block; padding: 1px 4px; border-radius: 3px; font-size: 9px; font-weight: 700; text-transform: uppercase; }
        .badge.gasto { background: var(--gasto-bg); color: var(--gasto); }
        .badge.ingreso { background: var(--ingreso-bg); color: var(--ingreso); }
        .badge.wallet { background: #e2e8f0; color: #334155; border: 1px solid var(--border); margin-left: 2px; max-width: 65px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; vertical-align: bottom; }
        
        .actions-wrapper { display: flex; gap: 2px; }
        .btn-trigger { background: transparent; color: var(--text-muted); padding: 4px; border: none; cursor: pointer; border-radius: 3px; font-size: 11px; }
        .btn-trigger:hover { background: #e2e8f0; color: var(--text-main); }
        .btn-trigger.danger:hover { background: var(--gasto-bg); color: var(--gasto); }
        
        .filter-select { width: auto; min-width: 110px; padding: 3px 6px; font-size: 11px; height: 24px; }
        .btn-print { background: #0f172a; color: white; padding: 4px 8px; font-size: 11px; height: 24px; }
        .btn-print:hover { background: #334155; }

        footer { 
            background: var(--bg-card); border: 1px solid var(--border); padding: 6px 14px; border-radius: var(--radius); display: flex; justify-content: space-between; align-items: center; font-size: 11px; flex-shrink: 0;
        }

        /* --- CONTENEDOR DE IMPRESIÓN DINÁMICO OCULTO EN PANTALLA --- */
        #contenedor-impresion-pwa { display: none; }

        /* --- MOTOR REGLAMENTARIO @MEDIA PRINT --- */
        @media print {
            body, html { height: auto; overflow: visible; background: #ffffff; color: #000000; padding: 0; margin: 0; }
            .container { display: none !important; } /* Oculta toda la app del cliente */
            #contenedor-impresion-pwa { display: block !important; padding: 20px; } /* Muestra solo la hoja limpia */
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Finanzas<span>Pro</span> <small style="color:var(--text-muted); font-size:10px;">v5.6 Advanced-Ledger</small></h1>
        
        <div class="balance-strip">
            <div class="balance-item">Neto Total: <b id="view-balance">$0,00</b></div>
            <div style="width:1px; height:12px; background:var(--border);"></div>
            <div class="balance-item">💵 Efec: <b id="view-bal-efectivo">$0,00</b></div>
            <div style="width:1px; height:12px; background:var(--border);"></div>
            <div class="balance-item">💳 <span id="label-hdr-debito1">Banco 1</span>: <b id="view-bal-debito1">$0,00</b></div>
            <div style="width:1px; height:12px; background:var(--border);"></div>
            <div class="balance-item">💳 <span id="label-hdr-debito2">Banco 2</span>: <b id="view-bal-debito2">$0,00</b></div>
            <div style="width:1px; height:12px; background:var(--border);"></div>
            <div class="balance-item" style="color:var(--ingreso);">I: <b id="view-ingresos" style="color:var(--ingreso); font-size:11px;">$0,00</b></div>
            <div class="balance-item" style="color:var(--gasto);">G: <b id="view-gastos" style="color:var(--gasto); font-size:11px;">$0,00</b></div>
        </div>
    </header>
    
    <div class="workspace-grid">
        <div class="panel">
            <h3>📁 Rubros</h3>
            <div class="form-container">
                <div class="form-group">
                    <label for="rubro-nombre">Nombre Rubro</label>
                    <input type="text" id="rubro-nombre" autocomplete="off" placeholder="Ej: Nafta...">
                </div>
                <div class="form-group">
                    <label for="rubro-tipo">Tipo</label>
                    <select id="rubro-tipo">
                        <option value="gasto">Gasto</option>
                        <option value="ingreso">Ingreso</option>
                    </select>
                </div>
                <input type="hidden" id="rubro-edit-id" value="">
                
                <div style="display: flex; gap: 4px; margin-bottom: 8px;">
                    <button id="btn-guardar-rubro" class="btn-primary" style="flex:1;">Añadir</button>
                    <button id="btn-cancelar-rubro" class="btn-secondary" style="display:none;">X</button>
                </div>
            </div>
            <div class="scroll-list" id="lista-rubros" style="max-height: 160px; margin-bottom: 8px;"></div>

            <h3 style="margin-top:auto; padding-top:4px;">🏦 Configurar Bancos</h3>
            <div class="form-container">
                <div class="form-group">
                    <label for="cfg-debito1">Nombre Banco 1</label>
                    <input type="text" id="cfg-debito1" placeholder="Ej: Galicia">
                </div>
                <div class="form-group">
                    <label for="cfg-debito2">Nombre Banco 2</label>
                    <input type="text" id="cfg-debito2" placeholder="Ej: Mercado Pago">
                </div>
                <button id="btn-guardar-bancos" class="btn-secondary btn-block" style="font-size:11px; padding:5px;">Guardar Nombres</button>
            </div>
        </div>

        <div class="panel">
            <h3>✍️ Carga de Transacciones</h3>
            <div class="form-container">
                <div class="form-group">
                    <label for="mov-concepto">Concepto / Detalle</label>
                    <input type="text" id="mov-concepto" autocomplete="off" placeholder="Ej: Pago repuesto...">
                </div>
                <div class="form-group">
                    <label for="mov-monto">Monto ($)</label>
                    <input type="number" id="mov-monto" step="0.01" min="0.01" placeholder="0,00">
                </div>
                <div class="form-group">
                    <label for="mov-rubro">Asignar Rubro</label>
                    <select id="mov-rubro"></select>
                </div>
                <div class="form-group">
                    <label for="mov-origen">Método de Pago / Destino Fondo</label>
                    <select id="mov-origen"></select>
                </div>
                <button id="btn-guardar-movimiento" class="btn-primary btn-block" style="background:#0f172a; margin-top:6px;">Asentar Registro</button>
            </div>
        </div>

        <div class="panel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px solid var(--border); flex-shrink: 0; gap: 4px;">
                <h3 style="margin-bottom:0; border-bottom:none;">📊 Libro Diario</h3>
                <div style="display: flex; gap: 4px;">
                    <select id="filtro-avanzado" class="filter-select"></select>
                    <button class="btn-print" onclick="ejecutarImpresionPWA()">🖨️ Imprimir</button>
                </div>
            </div>
            
            <div class="date-filter-strip">
                <div class="date-filter-group">
                    <label style="font-size: 9px; font-weight: 700;">DESDE</label>
                    <input type="date" id="filtro-fecha-desde">
                </div>
                <div class="date-filter-group">
                    <label style="font-size: 9px; font-weight: 700;">HASTA</label>
                    <input type="date" id="filtro-fecha-hasta">
                </div>
                <div style="display: flex; align-items: flex-end;">
                    <button class="btn-secondary" onclick="limpiarFiltrosFecha()" style="padding: 4px 6px; height: 21px; font-size: 10px;" title="Limpiar Fechas">X</button>
                </div>
            </div>

            <div class="scroll-list" id="lista-movimientos"></div>
        </div>

        <div class="panel">
            <h3>📈 Reporte por Mes</h3>
            <div class="scroll-list" id="lista-reporte-mensual"></div>
        </div>
    </div>

    <footer>
        <span style="color: var(--text-muted);" id="db-status">Almacenamiento Local Activo</span>
        <div class="actions-wrapper">
            <button class="btn-secondary" onclick="exportarBackup()" style="padding: 4px 8px; font-size:11px;">📥 Exportar</button>
            <button class="btn-secondary" onclick="document.getElementById('file-import').click()" style="padding: 4px 8px; font-size:11px;">📤 Importar</button>
            <input type="file" id="file-import" accept=".json" onchange="importarBackup(event)">
        </div>
    </footer>
</div>

<div id="contenedor-impresion-pwa"></div>

<script>
    let storageDisponible = true;
    try {
        localStorage.setItem('__brve__', '1');
        localStorage.removeItem('__brve__');
    } catch (e) {
        storageDisponible = false;
        document.getElementById('db-status').textContent = "Modo Volátil (Brave Shields)";
    }

    let DB = {
        nid: 1,
        rubros: [
            { id: 1, nombre: 'Sueldo', tipo: 'ingreso' },
            { id: 2, nombre: 'Supermercado', tipo: 'gasto' },
            { id: 3, nombre: 'Servicios', tipo: 'gasto' }
        ],
        movimientos: [],
        bancos: { debito1: 'Banco 1', debito2: 'Banco 2' }
    };

    const SKEY = 'finanzas-pro-compact-v6';

    window.onload = function() {
        if (storageDisponible && localStorage.getItem(SKEY)) {
            try { 
                DB = JSON.parse(localStorage.getItem(SKEY)); 
                if(!DB.bancos) DB.bancos = { debito1: 'Banco 1', debito2: 'Banco 2' };
            } catch(e) {}
        } else {
            DB.nid = 4;
            save();
        }
        
        document.getElementById('btn-guardar-rubro').addEventListener('click', guardarRubro);
        document.getElementById('btn-cancelar-rubro').addEventListener('click', cancelarEdicionRubro);
        document.getElementById('btn-guardar-movimiento').addEventListener('click', guardarMovimiento);
        document.getElementById('btn-guardar-bancos').addEventListener('click', guardarNombresBancos);
        document.getElementById('filtro-avanzado').addEventListener('change', render);
        document.getElementById('filtro-fecha-desde').addEventListener('change', render);
        document.getElementById('filtro-fecha-hasta').addEventListener('change', render);

        document.getElementById('cfg-debito1').value = DB.bancos.debito1;
        document.getElementById('cfg-debito2').value = DB.bancos.debito2;

        render();
    };

    function save() {
        if (storageDisponible) localStorage.setItem(SKEY, JSON.stringify(DB));
    }

    if ('serviceWorker' in navigator) {
        const repoPath = window.location.pathname.endsWith('/') ? window.location.pathname : window.location.pathname + '/';
        navigator.serviceWorker.register(repoPath + 'sw.js', { scope: repoPath })
            .then(reg => console.log('✅ PWA activa'))
            .catch(err => console.error('❌ Error PWA:', err));
    }

    function limpiarFiltrosFecha() {
        document.getElementById('filtro-fecha-desde').value = '';
        document.getElementById('filtro-fecha-hasta').value = '';
        render();
    }

    function guardarNombresBancos() {
        const d1 = document.getElementById('cfg-debito1').value.trim();
        const d2 = document.getElementById('cfg-debito2').value.trim();
        DB.bancos.debito1 = d1 || 'Banco 1';
        DB.bancos.debito2 = d2 || 'Banco 2';
        save(); render();
    }

    function guardarRubro() {
        const nombreInput = document.getElementById('rubro-nombre');
        const tipoSelect = document.getElementById('rubro-tipo');
        const editIdInput = document.getElementById('rubro-edit-id');
        const nombre = nombreInput.value.trim();
        if (!nombre) return;

        if (editIdInput.value) {
            const rubro = DB.rubros.find(r => r.id == editIdInput.value);
            if (rubro) { rubro.nombre = nombre; rubro.tipo = tipoSelect.value; }
            document.getElementById('btn-guardar-rubro').textContent = 'Añadir';
            document.getElementById('btn-cancelar-rubro').style.display = 'none';
            editIdInput.value = '';
        } else {
            DB.rubros.push({ id: DB.nid++, nombre: nombre, tipo: tipoSelect.value });
        }
        nombreInput.value = '';
        save(); render();
    }

    function editarRubro(id) {
        const rubro = DB.rubros.find(r => r.id == id);
        if (!rubro) return;
        document.getElementById('rubro-nombre').value = rubro.nombre;
        document.getElementById('rubro-tipo').value = rubro.tipo;
        document.getElementById('rubro-edit-id').value = rubro.id;
        document.getElementById('btn-guardar-rubro').textContent = 'Actualizar';
        document.getElementById('btn-cancelar-rubro').style.display = 'inline-flex';
    }

    function eliminarRubro(id) {
        if (!confirm('¿Eliminar rubro?')) return;
        DB.rubros = DB.rubros.filter(r => r.id != id);
        save(); render();
    }

    function guardarMovimiento() {
        const conceptoInput = document.getElementById('mov-concepto');
        const montoInput = document.getElementById('mov-monto');
        const rubroSelect = document.getElementById('mov-rubro');
        const origenSelect = document.getElementById('mov-origen');
        const monto = parseFloat(montoInput.value);
        const rubroId = parseInt(rubroSelect.value);
        if (isNaN(monto) || monto <= 0 || isNaN(rubroId)) return alert('Verifique los datos de carga.');
        
        DB.movimientos.push({
            id: DB.nid++, concepto: conceptoInput.value.trim() || 'General', monto: monto, rubroId: rubroId, origen: origenSelect.value, fecha: new Date().toLocaleDateString()
        });
        conceptoInput.value = ''; montoInput.value = '';
        save(); render();
    }

    function eliminarMovimiento(id) {
        if (!confirm('¿Remover asiento?')) return;
        DB.movimientos = DB.movimientos.filter(m => m.id != id);
        save(); render();
    }

    function exportarBackup() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(DB, null, 2));
        const downloadAnchor = document.createElement('a');
        const ahora = new Date();
        downloadAnchor.setAttribute("href", dataStr);
        downloadAnchor.setAttribute("download", `backup_contable_${ahora.toISOString().slice(0,10)}_${ahora.toTimeString().slice(0,8).replace(/:/g, '-')}.json`);
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click(); downloadAnchor.remove();
    }

    function importarBackup(event) {
        const reader = new FileReader();
        reader.onload = function() {
            try {
                const parsed = JSON.parse(reader.result);
                if (parsed.rubros && parsed.movimientos) {
                    if (confirm('Se detectó una copia válida. ¿Desea restaurarla?')) {
                        DB = parsed;
                        if (!DB.bancos) DB.bancos = { debito1: 'Banco 1', debito2: 'Banco 2' };
                        DB.movimientos.forEach(m => { if (!m.origen) m.origen = 'efectivo'; });
                        document.getElementById('cfg-debito1').value = DB.bancos.debito1;
                        document.getElementById('cfg-debito2').value = DB.bancos.debito2;
                        save(); render();
                        alert('Base de datos restaurada correctamente.');
                    }
                } else { alert('Estructura contable no compatible.'); }
            } catch(e) { alert('Fallo al interpretar el JSON.'); }
        };
        if(event.target.files[0]) reader.readAsText(event.target.files[0]);
        event.target.value = '';
    }

    function formatMoneda(valor) { return '$' + valor.toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, "."); }

    function parseStringToDate(fechaStr) {
        if(!fechaStr) return null;
        let partes = fechaStr.includes('/') ? fechaStr.split('/') : fechaStr.split('-');
        if (partes.length === 3) {
            if (partes[0].length === 4) { return new Date(parseInt(partes[0]), parseInt(partes[1]) - 1, parseInt(partes[2])); } 
            else { return new Date(parseInt(partes[2]), parseInt(partes[1]) - 1, parseInt(partes[0])); }
        }
        return new Date(fechaStr);
    }

    function obtenerMesClave(fechaStr) {
        const dateObj = parseStringToDate(fechaStr);
        if(!dateObj || isNaN(dateObj.getTime())) return { orden: '9999-12', etiqueta: 'Fecha General' };
        const m = dateObj.getMonth(); const a = dateObj.getFullYear();
        const nombresMeses = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
        return { orden: `${a}-${String(m + 1).padStart(2, '0')}`, etiqueta: `${nombresMeses[m]} ${a}` };
    }

    function obtenerMovimientosFiltrados() {
        const fValor = document.getElementById('filtro-avanzado').value || 'all';
        const fDesdeStr = document.getElementById('filtro-fecha-desde').value;
        const fHastaStr = document.getElementById('filtro-fecha-hasta').value;

        const dateDesde = fDesdeStr ? new Date(fDesdeStr + 'T00:00:00') : null;
        const dateHasta = fHastaStr ? new Date(fHastaStr + 'T23:59:59') : null;

        return DB.movimientos.filter(m => {
            const rubro = DB.rubros.find(r => r.id === m.rubroId);
            const tipo = rubro ? rubro.tipo : 'gasto';
            const origen = m.origen || 'efectivo';

            if (fValor !== 'all') {
                if ((fValor === 'gasto' || fValor === 'ingreso') && tipo !== fValor) return false;
                if (fValor === 'f-efectivo' && origen !== 'efectivo') return false;
                if (fValor === 'f-debito1' && origen !== 'debito1') return false;
                if (fValor === 'f-debito2' && origen !== 'debito2') return false;
            }

            const fechaMov = parseStringToDate(m.fecha);
            if (fechaMov) {
                if (dateDesde && fechaMov < dateDesde) return false;
                if (dateHasta && fechaMov > dateHasta) return false;
            }
            return true;
        });
    }

    // --- NUEVO MOTOR DE IMPRESIÓN INLINE INMUNE A CAÍDAS DE FOCO ---
    function ejecutarImpresionPWA() {
        const movimientosAImprimir = obtenerMovimientosFiltrados();
        if(movimientosAImprimir.length === 0) return alert('No hay movimientos que coincidan con los filtros aplicados.');

        const contenedor = document.getElementById('contenedor-impresion-pwa');
        let filasHtml = '';
        let acumuladoImpresion = 0;

        [...movimientosAImprimir].reverse().forEach((m, index) => {
            const rubro = DB.rubros.find(r => r.id === m.rubroId);
            const tipo = rubro ? rubro.tipo : 'gasto';
            const nRubro = rubro ? rubro.nombre : 'S/R';
            let tagOrigen = m.origen === 'debito1' ? DB.bancos.debito1 : (m.origen === 'debito2' ? DB.bancos.debito2 : 'Efectivo');
            
            if(tipo === 'ingreso') acumuladoImpresion += m.monto; else acumuladoImpresion -= m.monto;

            filasHtml += `
                <tr style="border-bottom: 1px solid #cbd5e1;">
                    <td style="padding: 6px; font-size: 11px;">${index + 1}</td>
                    <td style="padding: 6px; font-size: 11px;">${m.fecha}</td>
                    <td style="padding: 6px; font-size: 11px;"><strong>${m.concepto}</strong></td>
                    <td style="padding: 6px; font-size: 11px;">${nRubro}</td>
                    <td style="padding: 6px; font-size: 11px; color:#334155;">${tagOrigen}</td>
                    <td style="padding: 6px; font-size: 11px; text-align: right; font-weight: 700; color: ${tipo === 'gasto' ? '#ef4444' : '#10b981'}">
                        ${tipo === 'gasto' ? '-' : '+'}${formatMoneda(m.monto)}
                    </td>
                </tr>
            `;
        });

        const filtroTexto = document.getElementById('filtro-avanzado').options[document.getElementById('filtro-avanzado').selectedIndex].text;
        const fDesde = document.getElementById('filtro-fecha-desde').value;
        const fHasta = document.getElementById('filtro-fecha-hasta').value;
        const rangoTexto = (fDesde || fHasta) ? `Período: ${fDesde || 'Inicio'} hasta ${fHasta || 'Actualidad'}` : 'Historial Completo';

        // Inyectar el reporte estructurado en el div oculto
        contenedor.innerHTML = `
            <div style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #000000; background:#fff; padding:10px;">
                <div style="display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 2px solid #0f172a; padding-bottom: 10px; margin-bottom: 15px;">
                    <div>
                        <h1 style="margin: 0; font-size: 18px; font-weight:800; color: #0f172a;">Reporte de Movimientos Contables</h1>
                        <p style="margin: 3px 0 0 0; font-size: 11px; color: #475569;">${rangoTexto}</p>
                    </div>
                    <div style="text-align: right; font-size: 10px; color: #475569; line-height: 1.4;">
                        <strong>Filtro aplicado:</strong> ${filtroTexto}<br>
                        <strong>Emisión:</strong> ${new Date().toLocaleDateString()} ${new Date().toLocaleTimeString()}
                    </div>
                </div>
                <table style="width: 100%; border-collapse: collapse; margin-top: 10px;">
                    <thead>
                        <tr style="background: #0f172a; color: white;">
                            <th style="width: 35px; padding: 6px; font-size: 10px; text-align: left;">N°</th>
                            <th style="width: 75px; padding: 6px; font-size: 10px; text-align: left;">Fecha</th>
                            <th style="padding: 6px; font-size: 10px; text-align: left;">Concepto / Detalle</th>
                            <th style="padding: 6px; font-size: 10px; text-align: left;">Rubro</th>
                            <th style="padding: 6px; font-size: 10px; text-align: left;">Medio Financiero</th>
                            <th style="text-align: right; width: 100px; padding: 6px; font-size: 10px;">Monto</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${filasHtml}
                    </tbody>
                </table>
                <div style="display: flex; justify-content: flex-end; margin-top: 15px;">
                    <div style="background: #f8fafc; border: 1px solid #cbd5e1; padding: 8px 16px; border-radius: 4px; text-align: right;">
                        <span style="font-size: 10px; color: #475569; font-weight: 600;">BALANCE NETO FILTRADO</span>
                        <div style="font-size: 16px; font-weight: 800; color: ${acumuladoImpresion >= 0 ? '#10b981' : '#ef4444'}">${formatMoneda(acumuladoImpresion)}</div>
                    </div>
                </div>
            </div>
        `;

        // Lanzar diálogo nativo del sistema
        window.print();
    }

    function render() {
        DB.rubros.sort((a, b) => a.nombre.localeCompare(b.nombre));
        document.getElementById('label-hdr-debito1').textContent = DB.bancos.debito1;
        document.getElementById('label-hdr-debito2').textContent = DB.bancos.debito2;

        const listaRubros = document.getElementById('lista-rubros');
        listaRubros.innerHTML = '';
        DB.rubros.forEach(r => {
            const div = document.createElement('div'); div.className = 'compact-row';
            div.innerHTML = `<span><strong>${r.nombre}</strong> <span class="badge ${r.tipo}">${r.tipo[0]}</span></span><div class="actions-wrapper"><button class="btn-trigger edit-b">✏️</button><button class="btn-trigger danger del-b">🗑️</button></div>`;
            div.querySelector('.edit-b').addEventListener('click', () => editarRubro(r.id));
            div.querySelector('.del-b').addEventListener('click', () => eliminarRubro(r.id));
            listaRubros.appendChild(div);
        });

        const rubroSelect = document.getElementById('mov-rubro'); rubroSelect.innerHTML = '';
        DB.rubros.forEach(r => {
            const opt = document.createElement('option'); opt.value = r.id; opt.textContent = `${r.nombre} (${r.tipo[0].toUpperCase()})`; rubroSelect.appendChild(opt);
        });

        const origenSelect = document.getElementById('mov-origen');
        origenSelect.innerHTML = `<option value="efectivo">💵 Efectivo</option><option value="debito1">💳 ${DB.bancos.debito1}</option><option value="debito2">💳 ${DB.bancos.debito2}</option>`;

        const filtroSelect = document.getElementById('filtro-avanzado');
        const fFiltroAnterior = filtroSelect.value || 'all';
        filtroSelect.innerHTML = `
            <option value="all">🔍 Todo</option>
            <option value="gasto">🔻 Gastos</option>
            <option value="ingreso">🔺 Ingresos</option>
            <option value="f-efectivo">💵 Efectivo</option>
            <option value="f-debito1">💳 ${DB.bancos.debito1}</option>
            <option value="f-debito2">💳 ${DB.bancos.debito2}</option>
        `;
        filtroSelect.value = fFiltroAnterior;

        const listaMovimientos = document.getElementById('lista-movimientos'); listaMovimientos.innerHTML = '';
        let tIngresos = 0, tGastos = 0, balEfectivo = 0, balDebito1 = 0, balDebito2 = 0; let mapaMensual = {};

        DB.movimientos.forEach(m => {
            const rubro = DB.rubros.find(r => r.id === m.rubroId); const tipo = rubro ? rubro.tipo : 'gasto'; const mOrigen = m.origen || 'efectivo';
            if (tipo === 'ingreso') tIngresos += m.monto; else tGastos += m.monto;
            if (mOrigen === 'efectivo') { if (tipo === 'ingreso') balEfectivo += m.monto; else balEfectivo -= m.monto; } 
            else if (mOrigen === 'debito1') { if (tipo === 'ingreso') balDebito1 += m.monto; else balDebito1 -= m.monto; } 
            else if (mOrigen === 'debito2') { if (tipo === 'ingreso') balDebito2 += m.monto; else balDebito2 -= m.monto; }
            const infoMes = obtenerMesClave(m.fecha);
            if (!mapaMensual[infoMes.orden]) { mapaMensual[infoMes.orden] = { etiqueta: infoMes.etiqueta, ingresos: 0, gastos: 0 }; }
            if (tipo === 'ingreso') mapaMensual[infoMes.orden].ingresos += m.monto; else mapaMensual[infoMes.orden].gastos += m.monto;
        });

        const filtrados = obtenerMovimientosFiltrados();

        if (filtrados.length === 0) { 
            listaMovimientos.innerHTML = `<div style="text-align:center; padding:15px; color:var(--text-muted); font-size:11px;">Ningún asiento coincide con los filtros aplicados.</div>`; 
        } else {
            [...filtrados].reverse().forEach(m => {
                const rubro = DB.rubros.find(r => r.id === m.rubroId); const tipo = rubro ? rubro.tipo : 'gasto'; const nRubro = rubro ? rubro.nombre : 'S/R';
                let tagOrigen = m.origen === 'debito1' ? DB.bancos.debito1 : (m.origen === 'debito2' ? DB.bancos.debito2 : 'EFEC');
                const div = document.createElement('div'); div.className = 'compact-row';
                div.innerHTML = `<div><strong style="color:#0f172a;">${m.concepto}</strong><span style="color:var(--text-muted); font-size:10px; margin-left:4px;">${m.fecha}</span><span class="badge ${tipo}" style="margin-left:4px;">${nRubro}</span><span class="badge wallet" title="${tagOrigen}">${tagOrigen}</span></div><div class="actions-wrapper" style="align-items:center;"><span style="font-weight:700; margin-right:6px; color:var(--${tipo})">${tipo === 'gasto' ? '-' : '+'}${formatMoneda(m.monto)}</span><button class="btn-trigger danger del-m">🗑️</button></div>`;
                div.querySelector('.del-m').addEventListener('click', () => eliminarMovimiento(m.id)); listaMovimientos.appendChild(div);
            });
        }

        const listaReporte = document.getElementById('lista-reporte-mensual'); listaReporte.innerHTML = '';
        const mesesOrdenados = Object.keys(mapaMensual).sort().reverse();
        mesesOrdenados.forEach(clave => {
            const datos = mapaMensual[clave]; const balMensual = datos.ingresos - datos.gastos; const colorBal = balMensual >= 0 ? 'var(--ingreso)' : 'var(--gasto)';
            const div = document.createElement('div'); div.className = 'month-card';
            div.innerHTML = `<div class="month-header">${datos.etiqueta}</div><div class="month-data"><span>Ingresos:</span> <span style="color:var(--ingreso); font-weight:600;">+${formatMoneda(datos.ingresos)}</span></div><div class="month-data"><span>Gastos:</span> <span style="color:var(--gasto); font-weight:600;">-${formatMoneda(datos.gastos)}</span></div><div class="month-data" style="margin-top:4px; padding-top:4px; border-top:1px solid #e2e8f0; font-weight:700;"><span>Neto:</span> <span style="color:${colorBal};">${formatMoneda(balMensual)}</span></div>`;
            listaReporte.appendChild(div);
        });

        document.getElementById('view-ingresos').textContent = formatMoneda(tIngresos); document.getElementById('view-gastos').textContent = formatMoneda(tGastos);
        const balanceTotal = tIngresos - tGastos; const bEl = document.getElementById('view-balance'); bEl.textContent = formatMoneda(balanceTotal); bEl.style.color = balanceTotal >= 0 ? 'var(--ingreso)' : 'var(--gasto)';
        const elEf = document.getElementById('view-bal-efectivo'); elEf.textContent = formatMoneda(balEfectivo); elEf.style.color = balEfectivo >= 0 ? '' : 'var(--gasto)';
        const elD1 = document.getElementById('view-bal-debito1'); elD1.textContent = formatMoneda(balDebito1); elD1.style.color = balDebito1 >= 0 ? '' : 'var(--gasto)';
        const elD2 = document.getElementById('view-bal-debito2'); elD2.textContent = formatMoneda(balDebito2); elD2.style.color = balDebito2 >= 0 ? '' : 'var(--gasto)';
    }

    function cancelarEdicionRubro() {
        document.getElementById('rubro-nombre').value = ''; document.getElementById('rubro-edit-id').value = ''; document.getElementById('btn-guardar-rubro').textContent = 'Añadir'; document.getElementById('btn-cancelar-rubro').style.display = 'none';
    }
</script>
</body>
</html>
