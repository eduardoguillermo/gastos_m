<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanzasPro - Dashboard Premium</title>
    <style>
        :root {
            --bg-main: #f1f5f9;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --primary-light: #eff6ff;
            
            --ingreso: #059669;
            --ingreso-bg: #ecfdf5;
            --gasto: #dc2626;
            --gasto-bg: #fef2f2;
            
            --border: #e2e8f0;
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
            --transition: all 0.2s ease-in-out;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg-main); 
            color: var(--text-main); 
            padding: 40px 20px;
            -webkit-font-smoothing: antialiased;
        }
        
        .container { max-width: 1040px; margin: 0 auto; }
        
        /* Navbar / Header */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 32px; background: var(--bg-card); padding: 18px 24px;
            border-radius: var(--radius-md); border: 1px solid var(--border); box-shadow: var(--shadow-sm);
        }
        header h1 { font-size: 22px; font-weight: 800; color: #0f172a; letter-spacing: -0.5px; }
        header h1 span { color: var(--primary); }
        
        /* Dashboard de Métricas */
        .dashboard-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-bottom: 32px; }
        @media (max-width: 768px) { .dashboard-grid { grid-template-columns: 1fr; gap: 16px; } }
        
        .dash-card { 
            background: var(--bg-card); padding: 24px; border-radius: var(--radius-lg); 
            border: 1px solid var(--border); box-shadow: var(--shadow-md); position: relative; overflow: hidden;
        }
        .dash-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px;
        }
        .dash-card.balance::before { background: linear-gradient(90deg, var(--primary), #3b82f6); }
        .dash-card.ingresos::before { background: linear-gradient(90deg, var(--ingreso), #34d399); }
        .dash-card.gastos::before { background: linear-gradient(90deg, var(--gasto), #f87171); }

        .dash-card p { font-size: 12px; text-transform: uppercase; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; letter-spacing: 0.5px; }
        .dash-card h2 { font-size: 32px; font-weight: 800; letter-spacing: -1px; }
        
        /* Layout Grid */
        .main-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 32px; margin-bottom: 32px; }
        @media (max-width: 768px) { .main-grid { grid-template-columns: 1fr; gap: 24px; } }
        
        .card { 
            background: var(--bg-card); padding: 28px; border-radius: var(--radius-lg); 
            border: 1px solid var(--border); box-shadow: var(--shadow-md); 
        }
        .card h3 { font-size: 16px; font-weight: 700; margin-bottom: 24px; color: #0f172a; display: flex; align-items: center; gap: 10px; }
        
        /* Controles de Formulario Premium */
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 13px; color: #475569; }
        input, select { 
            width: 100%; padding: 12px 16px; border: 1px solid #cbd5e1; 
            border-radius: var(--radius-sm); font-size: 14px; color: var(--text-main);
            background-color: #fff; transition: var(--transition);
        }
        input:focus, select:focus { 
            outline: none; border-color: var(--primary); 
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
        }
        
        /* Botonera Estilizada */
        button { 
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            padding: 12px 20px; border: none; border-radius: var(--radius-sm); cursor: pointer; 
            font-weight: 600; font-size: 13px; transition: var(--transition); 
        }
        button.btn-block { width: 100%; padding: 14px; font-size: 14px; }
        button.btn-primary { background: var(--primary); color: white; box-shadow: 0 2px 4px rgba(37, 99, 235, 0.2); }
        button.btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }
        button.btn-secondary { background: #f1f5f9; color: #334155; }
        button.btn-secondary:hover { background: #e2e8f0; }
        
        /* Listas y Filas Modernas */
        .scroll-list { max-height: 320px; overflow-y: auto; margin-top: 12px; padding-right: 4px; }
        .scroll-list::-webkit-scrollbar { width: 6px; }
        .scroll-list::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        
        .row-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 14px 16px; background: #f8fafc; border: 1px solid #f1f5f9;
            border-radius: var(--radius-sm); margin-bottom: 8px; transition: var(--transition);
        }
        .row-item:hover { background: #f1f5f9; border-color: #e2e8f0; transform: translateX(2px); }
        
        /* Badges */
        .badge { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; }
        .badge.gasto { background: var(--gasto-bg); color: var(--gasto); }
        .badge.ingreso { background: var(--ingreso-bg); color: var(--ingreso); }
        
        /* Iconos de Acción */
        .actions-cell { display: flex; gap: 6px; }
        .btn-icon { background: #ffffff; color: var(--text-muted); padding: 8px; border-radius: 6px; border: 1px solid var(--border); box-shadow: var(--shadow-sm); cursor: pointer; }
        .btn-icon:hover { color: var(--text-main); background: #f8fafc; border-color: #cbd5e1; }
        .btn-icon.danger:hover { background: var(--gasto-bg); color: var(--gasto); border-color: #fca5a5; }
        
        /* Barra de Filtros Integrada */
        .filter-group { display: flex; background: #f1f5f9; padding: 4px; border-radius: var(--radius-sm); gap: 4px; }
        .filter-tab { background: transparent; color: var(--text-muted); padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; border: none; }
        .filter-tab.active { background: white; color: var(--text-main); box-shadow: var(--shadow-sm); }
        
        /* Footer Toolbar */
        .footer-panel { 
            background: var(--bg-card); border: 1px solid var(--border); padding: 20px 24px; 
            border-radius: var(--radius-md); box-shadow: var(--shadow-sm);
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; 
        }
        .backup-controls { display: flex; gap: 12px; align-items: center; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Finanzas<span>Pro</span></h1>
        <div id="connection-status" class="badge ingreso" style="font-size: 11px; padding: 6px 12px; border-radius: 20px;">Entorno Seguro HTTPS</div>
    </header>
    
    <div class="dashboard-grid">
        <div class="dash-card balance">
            <p>Balance Neto</p>
            <h2 id="view-balance">$0,00</h2>
        </div>
        <div class="dash-card ingresos">
            <p>Total Ingresos</p>
            <h2 id="view-ingresos" style="color: var(--ingreso);">$0,00</h2>
        </div>
        <div class="dash-card gastos">
            <p>Total Gastos</p>
            <h2 id="view-gastos" style="color: var(--gasto);">$0,00</h2>
        </div>
    </div>

    <div class="main-grid">
        <div class="card">
            <h3>📁 Configuración de Rubros</h3>
            <div class="form-group">
                <label for="rubro-nombre">Nombre de Categoría</label>
                <input type="text" id="rubro-nombre" autocomplete="off" placeholder="Ej: Viáticos, Sueldo, Combustible...">
            </div>
            <div class="form-group">
                <label for="rubro-tipo">Tipo de Operación</label>
                <select id="rubro-tipo">
                    <option value="gasto">Gasto (-)</option>
                    <option value="ingreso">Ingreso (+)</option>
                </select>
            </div>
            <input type="hidden" id="rubro-edit-id" value="">
            
            <div style="display: flex; gap: 8px; margin-bottom: 24px;">
                <button id="btn-guardar-rubro" class="btn-primary" style="flex: 1;">Guardar Categoría</button>
                <button id="btn-cancelar-rubro" class="btn-secondary" style="display:none;">Cancelar</button>
            </div>

            <p style="font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;">Mis Rubros Activos</p>
            <div class="scroll-list" id="lista-rubros"></div>
        </div>

        <div class="card">
            <h3>✍️ Asentar Nuevo Movimiento</h3>
            <div class="form-group">
                <label for="mov-concepto">Concepto / Descripción</label>
                <input type="text" id="mov-concepto" autocomplete="off" placeholder="Ej: Compra repuestos, Cobro certificado...">
            </div>
            <div class="form-group">
                <label for="mov-monto">Importe Total ($)</label>
                <input type="number" id="mov-monto" step="0.01" min="0.01" placeholder="0,00">
            </div>
            <div class="form-group">
                <label for="mov-rubro">Asignar Categoría</label>
                <select id="mov-rubro"></select>
            </div>
            <button id="btn-guardar-movimiento" class="btn-primary btn-block" style="background: #0f172a; box-shadow: 0 4px 12px rgba(15, 23, 42, 0.15);">Registrar en Historial</button>
        </div>
    </div>

    <div class="card" style="margin-bottom: 32px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px;">
            <h3>📊 Libro de Movimientos Diario</h3>
            <div class="filter-group">
                <button class="filter-tab active" id="filter-all">Ver Todos</button>
                <button class="filter-tab" id="filter-gasto">Solo Gastos</button>
                <button class="filter-tab" id="filter-ingreso">Solo Ingresos</button>
            </div>
        </div>
        <div id="lista-movimientos" style="max-height: 480px; overflow-y
