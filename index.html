<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanzasPro - Matrix Budget Edition</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --bg-main: #f1f5f9; --bg-card: #ffffff; --text-main: #0f172a; --text-muted: #64748b;
            --primary: #2563eb; --ingreso: #10b981; --gasto: #ef4444; --border: #cbd5e1; --radius: 6px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100vh; width: 100vw; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: var(--bg-main); color: var(--text-main); padding: 8px; font-size: 13px; display: flex; flex-direction: column; }
        .container { width: 100%; height: 100%; display: flex; flex-direction: column; gap: 8px; }
        header { display: flex; justify-content: space-between; align-items: center; background: var(--bg-card); padding: 6px 12px; border-radius: var(--radius); border: 1px solid var(--border); flex-shrink: 0; }
        .workspace-grid { display: grid; grid-template-columns: 320px 1fr 340px; gap: 8px; flex-grow: 1; min-height: 0; }
        @media (max-width: 1200px) { .workspace-grid { grid-template-columns: 1fr; overflow-y: auto; } }
        .panel { background: var(--bg-card); padding: 12px; border-radius: var(--radius); border: 1px solid var(--border); display: flex; flex-direction: column; height: 100%; min-height: 0; }
        .scroll-list { overflow-y: auto; flex-grow: 1; }
        .form-group { margin-bottom: 6px; }
        input, select { width: 100%; padding: 5px; border: 1px solid var(--border); border-radius: 4px; font-size: 12px; }
        button { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 12px; }
        .btn-primary { background: var(--primary); color: white; }
        .live-counter-strip { background: #f1f5f9; padding: 6px; border: 1px solid var(--border); border-radius: 4px; margin-bottom: 8px; text-align: center; font-weight: 700; }
        .filter-header { display: flex; gap: 4px; margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
        .filter-select { flex: 1; min-width: 80px; }
        .compact-row { display: flex; justify-content: space-between; padding: 5px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 4px; margin-bottom: 4px; font-size: 12px; }
        footer { background: var(--bg-card); border: 1px solid var(--border); padding: 6px; border-radius: var(--radius); display: flex; justify-content: space-between; }
        @media (max-width: 600px) { footer { flex-direction: column; gap: 4px; } }
    </style>
</head>
<body>
<div class="container">
    <header><h1>Finanzas<span>Pro</span> <small>v12.04</small></h1></header>
    <div class="workspace-grid">
        <div class="panel"><h3>✍️ Carga</h3>
            <div class="form-group"><label>Concepto</label><input type="text" id="mov-concepto"></div>
            <div class="form-group"><label>Monto</label><input type="number" id="mov-monto"></div>
            <div class="form-group"><label>Rubro</label><select id="mov-rubro"></select></div>
            <button class="btn-primary" id="btn-guardar-movimiento" style="width:100%">Asentar</button>
        </div>
        <div class="panel">
            <div class="filter-header">
                <h3 style="margin-bottom:0">📊 Diario</h3>
                <select id="filtro-rubro" class="filter-select" onchange="render()"><option value="all">Rubro</option></select>
                <input type="text" id="filtro-texto" class="filter-select" placeholder="Buscar..." oninput="render()">
                <button onclick="ejecutarImpresionPWA()">🖨️</button>
            </div>
            <div class="live-counter-strip">Total Filtrado: <b id="live-total-unico">$0,00</b></div>
            <div class="scroll-list" id="lista-movimientos"></div>
        </div>
        <div class="panel"><h3>📈 Estados</h3><div class="scroll-list" id="lista-reporte-mensual"></div></div>
    </div>
    <footer>
        <button onclick="exportarBackup()">📥 Exportar</button>
        <button onclick="document.getElementById('file-import').click()">📤 Importar</button>
        <input type="file" id="file-import" style="display:none" onchange="importarBackup(event)">
    </footer>
</div>
<script>
    const SKEY = 'finanzas-pro-compact-v12.04';
    let DB = { version: 12.04, nid: 1, rubros: [{id:1, nombre:'General', tipo:'gasto'}], movimientos: [] };

    window.onload = () => {
        let raw = localStorage.getItem(SKEY);
        if(raw) DB = JSON.parse(raw);
        document.getElementById('btn-guardar-movimiento').onclick = guardarMovimiento;
        render();
    };

    function guardarMovimiento() {
        const c = document.getElementById('mov-concepto').value;
        const m = parseFloat(document.getElementById('mov-monto').value);
        const r = parseInt(document.getElementById('mov-rubro').value);
        if(!c || !m) return;
        DB.movimientos.push({id: DB.nid++, concepto:c, monto:m, rubroId:r, fecha:new Date().toLocaleDateString()});
        localStorage.setItem(SKEY, JSON.stringify(DB));
        render();
    }

    function render() {
        const txt = document.getElementById('filtro-rubro').value;
        const busqueda = document.getElementById('filtro-texto').value.toLowerCase();
        const lista = document.getElementById('lista-movimientos');
        lista.innerHTML = '';
        
        let total = 0;
        DB.movimientos.filter(m => {
            const rMatch = txt === 'all' || m.rubroId == txt;
            const tMatch = m.concepto.toLowerCase().includes(busqueda);
            return rMatch && tMatch;
        }).forEach(m => {
            total += m.monto;
            lista.innerHTML += `<div class="compact-row"><span>${m.concepto}</span><b>$${m.monto}</b></div>`;
        });
        document.getElementById('live-total-unico').innerText = `$${total.toFixed(2)}`;
    }
</script>
</body>
</html>
